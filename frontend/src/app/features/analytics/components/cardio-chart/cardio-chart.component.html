<div class="solid-card p-6 rounded-2xl animate-fade-in relative border border-gray-300 dark:border-gray-700">
  
  <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
    <h2 class="text-xl font-semibold text-black dark:text-white flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-accent-pos" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      Cardio History
    </h2>
  </div>

  <div class="relative h-[400px] w-full mt-4">
    <!-- Loading overlay -->
    @if (isLoading()) {
      <div class="absolute inset-0 z-10 flex items-center justify-center bg-white/50 dark:bg-gray-900/50 backdrop-blur-sm rounded-xl transition-all">
        <div class="w-8 h-8 border-4 border-accent-pos border-t-transparent rounded-full animate-spin"></div>
      </div>
    }
    
    @if (chartData.datasets && chartData.datasets.length > 0 && chartData.labels && chartData.labels.length > 0) {
      <canvas 
        baseChart 
        [data]="chartData" 
        [options]="chartOptions" 
        [type]="chartType">
      </canvas>
    }

    @if ((!chartData.datasets || chartData.datasets.length === 0) && !isLoading()) {
      <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 dark:text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
        <p>No cardio history found.</p>
      </div>
    }
  </div>
</div>
