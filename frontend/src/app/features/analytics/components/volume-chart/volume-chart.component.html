<div class="glass-panel p-6 rounded-2xl animate-fade-in relative">
  
  <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
    <div>
      <h2 class="text-xl font-bold text-white tracking-tight">Weekly Volume</h2>
      <p class="text-sm text-slate-400 mt-1">Total sets per body part</p>
    </div>

    <form [formGroup]="form" class="flex flex-col sm:flex-row gap-3">
      <div>
        <label for="programId" class="sr-only">Program</label>
        <select
          id="programId"
          formControlName="programId"
          class="form-select bg-slate-800/50 border-slate-700 text-slate-200 rounded-lg text-sm focus:ring-sky-500 focus:border-sky-500 block w-full p-2.5 backdrop-blur-md transition-all">
          <option value="" disabled>Select Program</option>
          <option *ngFor="let prog of programs()" [value]="prog.id">{{ prog.name }}</option>
        </select>
      </div>

      <div>
        <label for="weekNumber" class="sr-only">Week</label>
        <select
          id="weekNumber"
          formControlName="weekNumber"
          class="form-select bg-slate-800/50 border-slate-700 text-slate-200 rounded-lg text-sm focus:ring-sky-500 focus:border-sky-500 block w-full p-2.5 backdrop-blur-md transition-all">
          <option value="" disabled>Select Week</option>
          <option *ngFor="let week of weeks(); let i = index" [value]="i + 1">Week {{ i + 1 }}</option>
        </select>
      </div>
    </form>
  </div>

  <div class="relative h-[300px] sm:h-[400px] w-full mt-4">
    <!-- Loading overlay -->
    <div *ngIf="isLoading()" class="absolute inset-0 z-10 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm rounded-xl transition-all">
      <div class="w-8 h-8 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    
    <canvas 
      *ngIf="barChartData.datasets[0].data.length > 0"
      baseChart 
      [data]="barChartData" 
      [options]="barChartOptions" 
      [type]="barChartType">
    </canvas>

    <div *ngIf="barChartData.datasets[0].data.length === 0 && !isLoading()" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      <p>No volume data available for this week</p>
    </div>
  </div>
</div>
