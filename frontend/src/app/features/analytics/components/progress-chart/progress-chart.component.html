<div class="glass-panel p-6 rounded-2xl animate-fade-in relative">
  
  <div class="flex flex-col sm:flex-row sm:items-start justify-between mb-6 gap-4">
    <div>
      <h2 class="text-xl font-bold text-white tracking-tight">Exercise Progress</h2>
      <p class="text-sm text-slate-400 mt-1">Max weight and total volume over time</p>
    </div>

    <form [formGroup]="form" class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
      
      <div class="flex items-center gap-2 bg-slate-800/50 p-2 rounded-lg border border-slate-700 backdrop-blur-md">
        <label for="showVolume" class="text-sm font-medium text-slate-300 select-none cursor-pointer">
          Show Volume
        </label>
        <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
          <input 
            type="checkbox" 
            id="showVolume" 
            formControlName="showVolume"
            class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"
            [class.translate-x-5]="form.get('showVolume')?.value"
            [class.border-violet-500]="form.get('showVolume')?.value"
            [class.border-slate-400]="!form.get('showVolume')?.value"/>
          <label 
            for="showVolume" 
            class="toggle-label block overflow-hidden h-5 rounded-full cursor-pointer transition-colors duration-200 ease-in-out"
            [class.bg-violet-500]="form.get('showVolume')?.value"
            [class.bg-slate-400]="!form.get('showVolume')?.value">
          </label>
        </div>
      </div>

      <div class="w-full sm:w-64">
        <label for="exerciseId" class="sr-only">Exercise</label>
        <select
          id="exerciseId"
          formControlName="exerciseId"
          class="form-select bg-slate-800/50 border-slate-700 text-slate-200 rounded-lg text-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5 backdrop-blur-md transition-all">
          <option value="" disabled>Select Exercise</option>
          <option *ngFor="let ex of exercises()" [value]="ex.id">{{ ex.name }}</option>
        </select>
      </div>

    </form>
  </div>

  <div class="relative h-[300px] sm:h-[400px] w-full mt-4">
    <!-- Loading overlay -->
    <div *ngIf="isLoading()" class="absolute inset-0 z-10 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm rounded-xl transition-all">
      <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    
    <canvas 
      *ngIf="lineChartData.datasets && lineChartData.datasets.length > 0 && lineChartData.datasets[0].data.length > 0"
      baseChart 
      [data]="lineChartData" 
      [options]="lineChartOptions" 
      [type]="lineChartType">
    </canvas>

    <div *ngIf="(!lineChartData.datasets || lineChartData.datasets.length === 0 || lineChartData.datasets[0].data.length === 0) && !isLoading()" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
      </svg>
      <p>No progress data logged for this exercise</p>
    </div>
  </div>
</div>
