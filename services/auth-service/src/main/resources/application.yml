server:
  port: 8081

spring:
  application:
    name: auth-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trainingapp}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth

  flyway:
    enabled: true
    schemas: auth
    default-schema: auth
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
    cookie-secure: ${COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
