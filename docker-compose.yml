# =============================================================
# Yes App — Full Stack Compose
# Usage: docker-compose up
# Requires a .env file at the project root (copy from .env.example).
# =============================================================

services:

  # -----------------------------------------------------------
  # Database — shared PostgreSQL instance, one schema per service
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Not exposed externally — accessed only via internal Docker network.
    # Use docker-compose.dev.yml to expose 5432 for local DB tools.

  # -----------------------------------------------------------
  # Redis — used for API Gateway rate limiting
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Not exposed externally.

  # -----------------------------------------------------------
  # auth-service (port 8081)
  # -----------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    # Port is intentionally NOT published — only the gateway reaches this service.

  # -----------------------------------------------------------
  # training-service (port 8082)
  # -----------------------------------------------------------
  training-service:
    build:
      context: .
      dockerfile: services/training-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port intentionally not published.

  # -----------------------------------------------------------
  # analytics-service (port 8083)
  # -----------------------------------------------------------
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port intentionally not published.

  # -----------------------------------------------------------
  # api-gateway (Internal port 8080) — no longer public, routed via Caddy
  # -----------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      TRAINING_SERVICE_URL: ${TRAINING_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      auth-service:
        condition: service_started
      training-service:
        condition: service_started
      analytics-service:
        condition: service_started
      redis:
        condition: service_healthy

  # -----------------------------------------------------------
  # frontend — nginx serving the Angular PWA (Internal port 80)
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api-gateway

  # -----------------------------------------------------------
  # Caddy — Internal HTTP Proxy (Traffic now comes from Tunnel)
  # -----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api-gateway

  # -----------------------------------------------------------
  # Cloudflare Tunnel — Secure ingress, no exposed ports
  # -----------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

  # -----------------------------------------------------------
  # Prometheus — Metrics Collection
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=48h'
    mem_limit: 250m
    mem_reservation: 150m
    volumes:
      - ./docs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  # -----------------------------------------------------------
  # Loki — Centralized Log Aggregation
  # -----------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    mem_limit: 300m
    mem_reservation: 150m
    volumes:
      - ./docs/observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/tmp/loki

  # -----------------------------------------------------------
  # Promtail — Docker Container Log Scraper
  # -----------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    mem_limit: 50m
    volumes:
      - ./docs/observability/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  # -----------------------------------------------------------
  # Grafana — Visualization & Dashboards
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    mem_limit: 250m
    mem_reservation: 150m
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./docs/observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docs/observability/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./docs/observability/grafana/dashboards/system-health.json:/var/lib/grafana/dashboards/system-health.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local

