name: CI

on:
  push:
    branches:
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ----------------------------------------------------------------
  # Backend — build and test all Maven modules
  # ----------------------------------------------------------------
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: mvn verify -B --no-transfer-progress

  # ----------------------------------------------------------------
  # Frontend — build and lint (skipped until frontend/ is scaffolded)
  # ----------------------------------------------------------------
  frontend:
    name: Frontend (Node 20 / Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check whether frontend has been scaffolded
        id: frontend-check
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json not found — skipping frontend job"
          fi

      - name: Set up Node 20
        if: steps.frontend-check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm ci
        working-directory: frontend

      - name: Build
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm run build
        working-directory: frontend

      - name: Lint
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm run lint
        working-directory: frontend
